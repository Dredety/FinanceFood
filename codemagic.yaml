workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    
    environment:
      xcode: latest
      cocoapods: default
      vars:
        APPLE_ID: ${APPLE_ID}
        APPLE_PASSWORD: ${APPLE_PASSWORD}
    
    scripts:
      - name: Set up signing
        script: |
          # Настраиваем автоматическую подпись
          echo "Setting up automatic signing..."
          
      - name: Build iOS app
        script: |
          xcodebuild -project FinanceFood.xcodeproj \
            -scheme FinanceFood \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/FinanceFood.xcarchive \
            -allowProvisioningUpdates \
            -skipUnavailableActions \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="" \
            clean archive
            
          xcodebuild -exportArchive \
            -archivePath build/FinanceFood.xcarchive \
            -exportPath build/ios \
            -exportOptionsPlist export_options.plist \
            -allowProvisioningUpdates
    
    artifacts:
      - build/ios/*.ipa
