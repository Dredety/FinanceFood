name: iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  APPLE_ID: ${{ secrets.APPLE_ID }}
  APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: List available schemes
      run: |
        echo "=== Доступные схемы ==="
        xcodebuild -project FinanceFood.xcodeproj -list
        
    - name: Build Archive
      run: |
        echo "=== Создаём архив ==="
        mkdir -p build
        xcodebuild -project FinanceFood.xcodeproj \
          -scheme FinanceFood \
          -configuration Release \
          -archivePath build/FinanceFood.xcarchive \
          -allowProvisioningUpdates \
          -skipUnavailableActions \
          clean archive
        echo "=== Проверка архива ==="
        ls -la build/
        
    - name: Export IPA
      run: |
        echo "=== Экспортируем IPA ==="
        mkdir -p build/ios
        xcodebuild -exportArchive \
          -archivePath build/FinanceFood.xcarchive \
          -exportPath build/ios \
          -exportOptionsPlist export_options.plist \
          -allowProvisioningUpdates
        echo "=== Проверка IPA ==="
        ls -la build/ios/
        
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: FinanceFood-iPA
        path: build/ios/*.ipa
        retention-days: 7
