name: iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  APPLE_ID: ${{ secrets.APPLE_ID }}
  APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Show available Xcode
      run: |
        xcodebuild -version
        xcrun --show-sdk-version
        
    - name: List schemes
      run: |
        echo "=== Схемы проекта ==="
        xcodebuild -project FinanceFood.xcodeproj -list
        
    - name: Build Archive (Automatic Signing)
      run: |
        echo "=== Создаём архив с авто-подписью ==="
        mkdir -p build
        
        # Сначала попробуем без явного указания команды
        xcodebuild -project FinanceFood.xcodeproj \
          -scheme FinanceFood \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -archivePath build/FinanceFood.xcarchive \
          -allowProvisioningUpdates \
          -skipUnavailableActions \
          CODE_SIGN_STYLE=Automatic \
          DEVELOPMENT_TEAM="" \
          clean archive || {
            echo "Первая попытка не удалась, пробуем с Apple ID..."
            
            # Если не сработало, используем Apple ID
            xcodebuild -project FinanceFood.xcodeproj \
              -scheme FinanceFood \
              -configuration Release \
              -destination 'generic/platform=iOS' \
              -archivePath build/FinanceFood.xcarchive \
              -allowProvisioningUpdates \
              -skipUnavailableActions \
              CODE_SIGN_STYLE=Automatic \
              clean archive
          }
          
        echo "=== Проверка архива ==="
        ls -la build/
        
    - name: Export IPA
      run: |
        echo "=== Экспортируем IPA ==="
        mkdir -p build/ios
        
        xcodebuild -exportArchive \
          -archivePath build/FinanceFood.xcarchive \
          -exportPath build/ios \
          -exportOptionsPlist export_options.plist \
          -allowProvisioningUpdates || {
            echo "Экспорт не удался. Пробуем упрощённый export_options..."
            
            # Создаём упрощённый plist
            cat > /tmp/export.plist << EOF
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
                <key>method</key>
                <string>development</string>
                <key>signingStyle</key>
                <string>automatic</string>
            </dict>
            </plist>
            EOF
            
            xcodebuild -exportArchive \
              -archivePath build/FinanceFood.xcarchive \
              -exportPath build/ios \
              -exportOptionsPlist /tmp/export.plist \
              -allowProvisioningUpdates
          }
          
        echo "=== Проверка IPA ==="
        ls -la build/ios/
        
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: FinanceFood-iPA
        path: build/ios/*.ipa
        retention-days: 7
